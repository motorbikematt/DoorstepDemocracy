---
layout: default
---
<article class="post">
  <header class="text-center mb-12">
    <h1 class="mb-4">{{ page.title }}</h1>
    <p class="text-secondary">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
    </p>
  </header>

  <div class="post-content util-14">
    {{ content }}
  </div>
</article>
